<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Système héliocentrique</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    text-align: center;
  }

  h2 {
    margin: 8px 0;
    font-size: 18px;
  }

  .wrapper {
    width: 100%;
    max-width: 600px;
    margin: 0 auto 8px auto;
  }

  canvas {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    background: #111;
    border-radius: 50%;
    display: block;
  }

  .controls {
    margin: 10px auto 20px auto;
    width: 90%;
    max-width: 600px;
    color: #ccc;
    font-size: 14px;
  }

  select, button {
    background: #222;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 12px;
    margin: 4px;
    cursor: pointer;
  }

  button:hover, select:hover {
    background: #333;
  }

  input[type=range] {
    width: 100%;
  }
</style>
</head>
<body>

<h2>Système héliocentrique</h2>

<!-- ========================= -->
<!--   CONTROLES TEMPORELS     -->
<!-- ========================= -->
<div class="controls">
  Unité temporelle :
  <select id="timeUnit">
    <option value="hours">Heures</option>
    <option value="days" selected>Jours</option>
    <option value="weeks">Semaines</option>
    <option value="months">Mois</option>
    <option value="years">Années</option>
  </select>
  <br><br>

  Temps simulé : <span id="offsetLabel">0 jours</span><br>
  <input id="timeSlider" type="range" min="-365" max="365" step="1" value="0">
</div>

<!-- ========================= -->
<!--   CONTROLES DE VUE        -->
<!-- ========================= -->
<div class="controls">
  <button id="modeFull">Vue complète</button>
  <button id="modeInner">Vue interne (0–2 UA)</button>
</div>

<div class="wrapper">
  <canvas id="heliocentric"></canvas>
</div>

<script>
let mode = "full"; // "full" ou "inner"
let timeOffset = 0;
let timeUnit = "days";

const COLORS = {
  mercury: "#bbbbbb",
  venus:   "#ffd27f",
  earth:   "#66aaff",
  mars:    "#ff5533",
  jupiter: "#ffddaa",
  saturn:  "#e6c97a",
  uranus:  "#66ccff",
  neptune: "#3366ff"
};

const slider = document.getElementById("timeSlider");
const label = document.getElementById("offsetLabel");
const unitSelect = document.getElementById("timeUnit");

unitSelect.onchange = () => {
  timeUnit = unitSelect.value;

  // Ajuste la plage du slider selon l’unité
  switch (timeUnit) {
    case "hours":
      slider.min = -48;
      slider.max = 48;
      slider.step = 1;
      break;

    case "days":
      slider.min = -365;
      slider.max = 365;
      slider.step = 1;
      break;

    case "weeks":
      slider.min = -104;
      slider.max = 104;
      slider.step = 1;
      break;

    case "months":
      slider.min = -60;
      slider.max = 60;
      slider.step = 1;
      break;

    case "years":
      slider.min = -20;
      slider.max = 20;
      slider.step = 1;
      break;
  }

  updateLabel();
  drawHeliocentric();
};

slider.oninput = () => {
  timeOffset = Number(slider.value);
  updateLabel();
  drawHeliocentric();
};

function updateLabel() {
  const sign = timeOffset >= 0 ? "+" : "";
  const unitNames = {
    hours: "h",
    days: " jours",
    weeks: " semaines",
    months: " mois",
    years: " ans"
  };
  label.textContent = sign + timeOffset + unitNames[timeUnit];
}

document.getElementById("modeFull").onclick = () => {
  mode = "full";
  drawHeliocentric();
};

document.getElementById("modeInner").onclick = () => {
  mode = "inner";
  drawHeliocentric();
};

function computeDate() {
  const now = Date.now();

  switch (timeUnit) {
    case "hours":
      return new Date(now + timeOffset * 3600 * 1000);

    case "days":
      return new Date(now + timeOffset * 24 * 3600 * 1000);

    case "weeks":
      return new Date(now + timeOffset * 7 * 24 * 3600 * 1000);

    case "months":
      const d1 = new Date();
      d1.setMonth(d1.getMonth() + timeOffset);
      return d1;

    case "years":
      const d2 = new Date();
      d2.setFullYear(d2.getFullYear() + timeOffset);
      return d2;
  }
}

async function drawHeliocentric() {
  const canvas = document.getElementById("heliocentric");

  const size = Math.min(canvas.clientWidth, canvas.clientWidth);
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;
  const CX = W / 2;
  const CY = H / 2;

  ctx.clearRect(0, 0, W, H);

  const date = computeDate();
  const res = await fetch(`/api/heliocentric?offset=0&date=${date.toISOString()}`);
  const data = await res.json();

  const planets = data.planets;

  // Détermination de l'échelle selon le mode
  let maxR = 0;

  if (mode === "full") {
    for (const name in planets) {
      const p = planets[name];
      const r = Math.sqrt(p.x*p.x + p.y*p.y);
      if (r > maxR) maxR = r;
    }
  } else {
    maxR = 2;
  }

  const R = (W/2 - 20) / maxR;

  // Soleil
  ctx.beginPath();
  ctx.arc(CX, CY, 10, 0, 2*Math.PI);
  ctx.fillStyle = "yellow";
  ctx.fill();

  // Orbites
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;

  for (const name in planets) {
    const p = planets[name];
    const r = Math.sqrt(p.x*p.x + p.y*p.y) * R;

    if (mode === "inner" && r > 2 * R) continue;

    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, 2*Math.PI);
    ctx.stroke();
  }

  // Planètes
  ctx.font = `${Math.round(W * 0.022)}px sans-serif`;
  ctx.fillStyle = "#fff";

  for (const name in planets) {
    const p = planets[name];
    const r_ua = Math.sqrt(p.x*p.x + p.y*p.y);

    if (mode === "inner" && r_ua > 2) continue;

    const x = CX + p.x * R;
    const y = CY - p.y * R;

    ctx.beginPath();
    ctx.arc(x, y, 6, 0, 2*Math.PI);
    ctx.fillStyle = COLORS[name] || "#fff";
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.fillText(name.toUpperCase(), x + 8, y);
  }
}

drawHeliocentric();
window.addEventListener("resize", drawHeliocentric);
setInterval(drawHeliocentric, 60000);
</script>

</body>
</html>
