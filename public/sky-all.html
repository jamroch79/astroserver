<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carte du ciel – Planètes + Comètes</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    text-align: center;
  }

  h2 {
    margin: 8px 0;
    font-size: 18px;
  }

  .wrapper {
    width: 100%;
    max-width: 600px;
    margin: 0 auto 8px auto;
  }

  canvas {
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    background: #111;
    border-radius: 50%;
    display: block;
  }

  .slider-container {
    margin: 10px auto 20px auto;
    width: 90%;
    max-width: 600px;
    color: #ccc;
    font-size: 14px;
  }

  input[type=range] {
    width: 100%;
  }

  .comet-box {
    margin: 10px auto;
    width: 90%;
    max-width: 600px;
    color: #ccc;
    font-size: 14px;
  }

  input[type=text] {
    width: 60%;
    padding: 6px;
    font-size: 14px;
  }

  button {
    padding: 6px 12px;
    margin-left: 6px;
    font-size: 14px;
  }

  select {
    padding: 6px;
    font-size: 14px;
    margin-top: 6px;
  }
</style>
</head>
<body>

<h2>Carte du ciel – Planètes + Comètes</h2>

<!-- Slider -->
<div class="slider-container">
  Temps simulé : <span id="offsetLabel">0h</span><br>
  <input id="timeSlider" type="range" min="-12" max="12" step="1" value="0">
</div>

<!-- Recherche de comète -->
<div class="comet-box">
  <input id="cometInput" type="text" placeholder="Nom de comète (ex: C/2023 A3)">
  <button onclick="searchComet()">Rechercher</button>
  <button onclick="saveComet()">Sauvegarder</button>

  <br><br>
  <label>Comètes enregistrées :</label><br>
  <select id="savedComets" onchange="loadSavedComet()">
    <option value="">-- Choisir --</option>
  </select>

  <div id="cometInfo" style="margin-top:10px; color:#8f8;">
  </div>
</div>

<div class="wrapper">
  <canvas id="sky"></canvas>
</div>

<script>
let timeOffsetHours = 0;
let currentComet = null;

const PLANETS = [
  "mercury","venus","mars","jupiter","saturn","uranus","neptune","pluto"
];

const COLORS = {
  mercury:"#bbbbbb", venus:"#ffd27f", mars:"#ff5533",
  jupiter:"#ffddaa", saturn:"#e6c97a", uranus:"#66ccff",
  neptune:"#3366ff", pluto:"#cccccc"
};

/* --- Slider --- */
const slider = document.getElementById("timeSlider");
const label = document.getElementById("offsetLabel");

slider.oninput = () => {
  timeOffsetHours = Number(slider.value);
  label.textContent = (timeOffsetHours >= 0 ? "+" : "") + timeOffsetHours + "h";
  drawSky();
};

/* --- Charger les comètes enregistrées --- */
async function loadSavedList() {
  const res = await fetch("/api/comet/saved");
  const list = await res.json();

  const sel = document.getElementById("savedComets");
  sel.innerHTML = `<option value="">-- Choisir --</option>`;

  list.forEach(c => {
    sel.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

loadSavedList();

/* --- Charger une comète enregistrée --- */
async function loadSavedComet() {
  const name = document.getElementById("savedComets").value;
  if (!name) return;

  document.getElementById("cometInput").value = name;
  await searchComet();
}

/* --- Rechercher une comète --- */
async function searchComet() {
  const name = document.getElementById("cometInput").value.trim();
  if (!name) return;

  const res = await fetch(`/api/comet/search?name=${encodeURIComponent(name)}`);
  const data = await res.json();

  if (data.error) {
    document.getElementById("cometInfo").innerHTML = `<span style="color:#f88">${data.error}</span>`;
    currentComet = null;
    drawSky();
    return;
  }

  currentComet = data.data;

  document.getElementById("cometInfo").innerHTML =
    `<b>${currentComet.name}</b><br>
     RA: ${currentComet.ra}<br>
     Dec: ${currentComet.dec}<br>
     Alt: ${currentComet.alt}°<br>
     Az: ${currentComet.az}°<br>
     Mag: ${currentComet.mag}`;

  drawSky();
}

/* --- Sauvegarder une comète --- */
async function saveComet() {
  const name = document.getElementById("cometInput").value.trim();
  if (!name) return;

  await fetch("/api/comet/save", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ name })
  });

  loadSavedList();
}

/* --- Dessiner la comète --- */
function drawComet(ctx, CX, CY, R) {
  if (!currentComet) return;

  const az = currentComet.az * Math.PI / 180;
  const alt = currentComet.alt;

  if (alt < 0) return;

  const r = R * (1 - alt / 90);

  const x = CX + Math.sin(az) * r;
  const y = CY - Math.cos(az) * r;

  ctx.beginPath();
  ctx.arc(x, y, 8, 0, 2*Math.PI);
  ctx.fillStyle = "#00ffcc";
  ctx.fill();

  ctx.fillStyle = "#fff";
  ctx.fillText(currentComet.name, x + 10, y);
}

/* --- Dessin du ciel --- */
async function drawSky() {
  const canvas = document.getElementById("sky");

  const size = Math.min(canvas.clientWidth, canvas.clientWidth);
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  const W = canvas.width;
  const H = canvas.height;
  const CX = W / 2;
  const CY = H / 2;
  const R = Math.min(W, H) / 2 - 20;

  ctx.clearRect(0, 0, W, H);

  // cercle horizon
  ctx.strokeStyle = "#555";
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.stroke();

  // Directions cardinales
  const directions = [
    { label: "N",  angle: 0 },
    { label: "NE", angle: 45 },
    { label: "E",  angle: 90 },
    { label: "SE", angle: 135 },
    { label: "S",  angle: 180 },
    { label: "SW", angle: 225 },
    { label: "W",  angle: 270 },
    { label: "NW", angle: 315 }
  ];

  ctx.fillStyle = "#fff";
  ctx.font = `${Math.round(W * 0.026)}px sans-serif`;

  for (const d of directions) {
    const rad = d.angle * Math.PI / 180;
    const x = CX + Math.sin(rad) * (R - 20);
    const y = CY - Math.cos(rad) * (R - 20);
    ctx.fillText(d.label, x - 10, y + 5);
  }

  // Graduations d’azimut
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 1;

  for (let angle = 0; angle < 360; angle += 30) {
    const rad = angle * Math.PI / 180;

    const x1 = CX + Math.sin(rad) * R;
    const y1 = CY - Math.cos(rad) * R;

    const x2 = CX + Math.sin(rad) * (R - 20);
    const y2 = CY - Math.cos(rad) * (R - 20);

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // Cercles d'altitude
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 1;

  let r30 = R * (1 - 30/90);
  ctx.beginPath();
  ctx.arc(CX, CY, r30, 0, 2*Math.PI);
  ctx.stroke();

  let r60 = R * (1 - 60/90);
  ctx.beginPath();
  ctx.arc(CX, CY, r60, 0, 2*Math.PI);
  ctx.stroke();

  ctx.fillStyle = "#888";
  ctx.font = `${Math.round(W * 0.022)}px sans-serif`;
  ctx.fillText("30°", CX + r30 + 5, CY);
  ctx.fillText("60°", CX + r60 + 5, CY);

  // --- Planètes ---
  for (const planet of PLANETS) {
    const res = await fetch(`/api/planet/${planet}?offset=${timeOffsetHours}`);
    const p = await res.json();

    const px = CX + p.proj_x * R;
    const py = CY - p.proj_y * R;

    const PR = Math.max(6, R * 0.04);

    ctx.beginPath();
    ctx.arc(px, py, PR, 0, 2*Math.PI);
    ctx.fillStyle = COLORS[planet];
    ctx.fill();

    if (planet === "mercury" || planet === "venus") {
      const frac = p.illumination;

      ctx.beginPath();
      ctx.arc(px, py, PR, Math.PI/2, -Math.PI/2, true);
      ctx.arc(px + (1 - frac) * PR, py, PR, -Math.PI/2, Math.PI/2, false);
      ctx.fillStyle = "black";
      ctx.fill();
    }

    ctx.fillStyle = "#fff";
    ctx.font = `${Math.round(W * 0.022)}px sans-serif`;
    ctx.fillText(planet.toUpperCase(), px + PR + 4, py);
  }

  // --- Comète (si demandée) ---
  drawComet(ctx, CX, CY, R);
}

drawSky();
window.addEventListener("resize", drawSky);
setInterval(drawSky, 60000);
</script>

</body>
</html>
