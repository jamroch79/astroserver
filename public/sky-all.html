<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carte du ciel – Planètes</title>
<style>
  body { background: #000; color: #fff; text-align: center; }
  canvas { background: #111; border-radius: 50%; margin-top: 20px; }
</style>
</head>
<body>

<h2>Carte du ciel – Planètes</h2>
<canvas id="sky" width="600" height="600"></canvas>

<script>
const PLANETS = [
  "mercury",
  "venus",
  "mars",
  "jupiter",
  "saturn",
  "uranus",
  "neptune",
  "pluto"
];

const COLORS = {
  mercury: "#bbbbbb",
  venus: "#ffd27f",
  mars: "#ff5533",
  jupiter: "#ffddaa",
  saturn: "#e6c97a",
  uranus: "#66ccff",
  neptune: "#3366ff",
  pluto: "#cccccc"
};

async function drawSky() {
  const ctx = document.getElementById("sky").getContext("2d");

  ctx.clearRect(0, 0, 600, 600);

  // cercle horizon
  ctx.strokeStyle = "#555";
  ctx.beginPath();
  ctx.arc(300, 300, 280, 0, 2*Math.PI);
  ctx.stroke();

  // -------------------------------
  // Directions cardinales
  // -------------------------------
  const directions = [
    { label: "N",  angle: 0 },
    { label: "NE", angle: 45 },
    { label: "E",  angle: 90 },
    { label: "SE", angle: 135 },
    { label: "S",  angle: 180 },
    { label: "SW", angle: 225 },
    { label: "W",  angle: 270 },
    { label: "NW", angle: 315 }
  ];

  ctx.fillStyle = "#fff";
  ctx.font = "16px sans-serif";

  for (const d of directions) {
    const rad = d.angle * Math.PI / 180;
    const x = 300 + Math.sin(rad) * 260;
    const y = 300 - Math.cos(rad) * 260;
    ctx.fillText(d.label, x - 10, y + 5);
  }

  // -------------------------------
  // Graduations d’azimut (tous les 30°)
  // -------------------------------
  ctx.strokeStyle = "#444";
  ctx.lineWidth = 1;

  for (let angle = 0; angle < 360; angle += 30) {
    const rad = angle * Math.PI / 180;

    const x1 = 300 + Math.sin(rad) * 280;
    const y1 = 300 - Math.cos(rad) * 280;

    const x2 = 300 + Math.sin(rad) * 260;
    const y2 = 300 - Math.cos(rad) * 260;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // -------------------------------
  // Planètes
  // -------------------------------
  for (const planet of PLANETS) {
    const res = await fetch(`/api/planet/${planet}`);
    const p = await res.json();

    const x = 300 + p.proj_x * 280;
    const y = 300 - p.proj_y * 280;

    // Taille apparente du disque
    const R = 12;

    // Disque plein (fond)
    ctx.beginPath();
    ctx.arc(x, y, R, 0, 2*Math.PI);
    ctx.fillStyle = COLORS[planet];
    ctx.fill();

    // Croissant (partie non éclairée)
    const frac = p.illumination; // 0 à 1

    ctx.beginPath();
    ctx.arc(x, y, R, Math.PI/2, -Math.PI/2, true);
    ctx.arc(x + (1 - frac) * R, y, R, -Math.PI/2, Math.PI/2, false);
    ctx.fillStyle = "black";
    ctx.fill();

    // Nom de la planète
    ctx.fillStyle = "#fff";
    ctx.fillText(planet.toUpperCase(), x + 12, y);
  }
}

drawSky();
setInterval(drawSky, 60000);
</script>

</body>
</html>
