<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Master Control</title>
    <style>
        body { background: #000; color: #ff3333; font-family: 'Courier New', monospace; text-align: center; padding: 10px; }
        .card { border: 2px solid #440000; display: inline-block; padding: 15px; border-radius: 12px; background: #0a0a0a; width: 320px; }
        .val { font-size: 2.2em; font-weight: bold; color: #fff; text-shadow: 0 0 10px #ff0000; }
        canvas { background: #000; border: 1px solid #222; border-radius: 50%; margin: 15px 0; }
        .btn-group { margin: 10px 0; display: flex; justify-content: space-around; }
        button { background: #330000; color: #ff3333; border: 1px solid #ff3333; padding: 5px 10px; cursor: pointer; font-size: 10px; }
        button:hover { background: #ff3333; color: #000; }
        #site-name { font-weight: bold; color: #00ff00; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="site-name">MODE : AUTO (GPS)</div>
    <div id="coords" style="font-size: 0.8em;">--°N / --°E</div>

    <div class="btn-group">
        <button onclick="setPos(45.6603, 4.7714, 'VOURLES')">VOURLES</button>
        <button onclick="setPos(45.1391, 5.5856, 'LANS')">LANS</button>
        <button onclick="setPos(52.0, 13.0, 'BERLIN')">BERLIN</button>
        <button onclick="useGPS()">GPS</button>
    </div>
    
    <canvas id="scope" width="260" height="260"></canvas>

    <div style="font-size: 0.9em;">ANGLE HORAIRE (HA)</div>
    <div id="ha" class="val">00:00</div>

    <div style="font-size: 0.9em; margin-top: 10px;">VISEUR (P.SCOPE)</div>
    <div id="pscope" class="val">00:00</div>
</div>

<script>
    let lat = 45.66;
    let lon = 4.77;
    let autoGPS = true;

    function useGPS() {
        autoGPS = true;
        document.getElementById('site-name').innerText = "MODE : AUTO (GPS)";
        navigator.geolocation.getCurrentPosition(pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
        });
    }

    function setPos(newLat, newLon, name) {
        autoGPS = false;
        lat = newLat;
        lon = newLon;
        document.getElementById('site-name').innerText = "MODE : " + name;
        document.getElementById('coords').innerText = `${lat.toFixed(2)}°N / ${lon.toFixed(2)}°E`;
    }

    function solve() {
        if(autoGPS) {
            navigator.geolocation.getCurrentPosition(pos => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                document.getElementById('coords').innerText = `${lat.toFixed(2)}°N / ${lon.toFixed(2)}°E`;
            }, null, {enableHighAccuracy: true});
        }

        const now = new Date();
        const JD = (now / 86400000) + 2440587.5;
        const D = JD - 2451545.0;
        const GMST = (18.697374558 + 24.06570982441908 * D) % 24;
        const LST = (GMST + (lon / 15) + 24) % 24;

        // Précession JNow Polaris
        const RA_Polaris = 2.53 + (0.02 * ((JD - 2451545.0) / 365.25));

        let ha = (LST - RA_Polaris + 24) % 24;
        
        // Offset Sky-Watcher pour tomber sur les valeurs de ton appli
        let pscope = (ha / 2) - 1.48; 
        pscope = (pscope + 12) % 12;

        document.getElementById('ha').innerText = format(ha);
        document.getElementById('pscope').innerText = formatClock(pscope);
        render(pscope);
    }

    function format(h) {
        let hr = Math.floor(h);
        let mn = Math.floor((h - hr) * 60);
        return `${hr.toString().padStart(2,'0')}:${mn.toString().padStart(2,'0')}`;
    }

    function formatClock(h) {
        let hr = Math.floor(h);
        if (hr === 0) hr = 12;
        let mn = Math.floor((h - Math.floor(h)) * 60);
        return `${hr.toString().padStart(2,'0')}:${mn.toString().padStart(2,'0')}`;
    }

    function render(p) {
        const c = document.getElementById('scope');
        const ctx = c.getContext('2d');
        ctx.clearRect(0,0,260,260);
        
        ctx.strokeStyle = "#220000";
        ctx.beginPath(); ctx.arc(130,130,105,0,7); ctx.stroke();
        
        // Graduation 12h
        ctx.fillStyle = "#440000";
        for(let i=1; i<=12; i++) {
            let a = (i * 30 - 90) * (Math.PI/180);
            ctx.fillText(i, 126 + Math.cos(a)*90, 134 + Math.sin(a)*90);
        }

        // Polaris
        let angle = (p * 30 - 90) * (Math.PI / 180);
        ctx.fillStyle = "#ff0000";
        ctx.shadowBlur = 15; ctx.shadowColor = "red";
        ctx.beginPath();
        ctx.arc(130 + Math.cos(angle)*105, 130 + Math.sin(angle)*105, 6, 0, 7);
        ctx.fill();
    }

    setInterval(solve, 1000);
    useGPS(); // Lance le GPS au démarrage
</script>
</body>
</html>
