<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Pro - Vourles & Lans</title>
    <style>
        body { 
            background: #000; 
            color: #ff3333; 
            font-family: 'Courier New', monospace; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        /* CARD RESPONSIVE */
        .card { 
            border: 2px solid #440000; 
            display: block;
            padding: 25px; 
            border-radius: 20px; 
            background: #080808; 
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            box-shadow: 0 0 25px #300; 
        }

        .val { 
            font-size: 2.4em; 
            font-weight: bold; 
            color: #fff; 
            text-shadow: 0 0 15px #ff0000; 
            margin: 10px 0; 
        }

        /* CANVAS RESPONSIVE */
        canvas { 
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #000; 
            border: 1px solid #222; 
            border-radius: 50%; 
            margin: 20px 0; 
            display: block;
        }

        .btn-group { 
            margin: 15px 0; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
        }

        button { 
            background: #200; 
            color: #ff3333; 
            border: 1px solid #ff3333; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: bold; 
            border-radius: 6px; 
            transition: all 0.2s;
        }

        button:active { 
            background: #ff3333; 
            color: #000; 
        }

        #site-name { 
            font-weight: bold; 
            color: #00ff00; 
            margin-bottom: 5px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .label { 
            font-size: 0.9em; 
            color: #888; 
            letter-spacing: 2px; 
            margin-top: 15px;
        }

        #coords { 
            font-size: 0.8em; 
            color: #555; 
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="site-name">SITE : VOURLES</div>
    <div id="coords">45.6601°N / 4.7713°E</div>

    <div class="btn-group">
        <button onclick="setPos(45.6601, 4.7713, 'VOURLES')">VOURLES</button>
        <button onclick="setPos(45.1391, 5.5856, 'LANS')">LANS</button>
    </div>
    
    <canvas id="scope"></canvas>

    <div class="label">ANGLE HORAIRE (HA)</div>
    <div id="ha" class="val" style="font-size: 1.8em; color: #ff6666;">--:--</div>

    <div class="label">VISEUR (P.SCOPE)</div>
    <div id="pscope" class="val">--:--</div>
</div>

<script>
    let currentLat = 45.6601;
    let currentLon = 4.7713;

    function setPos(newLat, newLon, name) {
        currentLat = newLat;
        currentLon = newLon;
        document.getElementById('site-name').innerText = "SITE : " + name;
        document.getElementById('coords').innerText = `${currentLat.toFixed(4)}°N / ${currentLon.toFixed(4)}°E`;
        solve();
    }

    function solve() {
        const now = new Date();
        const JD = (now / 86400000) + 2440587.5;
        const D = JD - 2451545.0;

        let GMST = (18.697374558 + 24.06570982441908 * D) % 24;
        let LST = (GMST + (currentLon / 15) + 24) % 24;

        const RA_Polaris = 2.53 + (0.021 * (D / 365.25));

        let ha = (LST - RA_Polaris + 24) % 24;

        let pscope = 18 - (ha / 2);
        pscope = (pscope % 12 + 12) % 12;

        document.getElementById('ha').innerText = formatToHM(ha);
        document.getElementById('pscope').innerText = formatToClock(pscope);

        draw(pscope);
    }

    function formatToHM(decimal) {
        let h = Math.floor(decimal);
        let m = Math.floor((decimal - h) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function formatToClock(decimal) {
        let h = Math.floor(decimal);
        if (h === 0) h = 12;
        let m = Math.floor((decimal - Math.floor(decimal)) * 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    function draw(p) {
        const canvas = document.getElementById('scope');

        // Responsive internal resolution
        const size = canvas.clientWidth;
        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext('2d');
        const cx = size / 2;
        const cy = size / 2;
        const r = size * 0.41;

        ctx.clearRect(0, 0, size, size);

        ctx.strokeStyle = "#300"; 
        ctx.lineWidth = size * 0.01;
        ctx.beginPath(); 
        ctx.arc(cx, cy, r, 0, Math.PI * 2); 
        ctx.stroke();

        ctx.fillStyle = "#500"; 
        ctx.font = `${size * 0.05}px Arial`;

        for(let i = 1; i <= 12; i++) {
            let angle = (i * 30 - 90) * (Math.PI / 180);
            ctx.fillText(i, cx - (size*0.02) + Math.cos(angle) * (r - size*0.08),
                            cy + (size*0.02) + Math.sin(angle) * (r - size*0.08));
        }

        let starAngle = (p * 30 - 90) * (Math.PI / 180);
        ctx.shadowBlur = size * 0.06; 
        ctx.shadowColor = "red";
        ctx.fillStyle = "#ff0000";
        ctx.beginPath(); 
        ctx.arc(cx + Math.cos(starAngle) * r,
               cy + Math.sin(starAngle) * r,
               size * 0.025, 0, Math.PI * 2); 
        ctx.fill();
    }

    setInterval(solve, 1000);
    solve();
</script>
</body>
</html>
