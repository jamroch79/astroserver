<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Historique KP (3h NOAA)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      padding: 10px;
    }
    #chart-container {
      width: 100%;
      height: 90vh;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">Historique KP (fenêtres de 3h — NOAA)</h2>

<div id="chart-container">
  <canvas id="kp3h"></canvas>
</div>

<script>
  const url = "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json";

  fetch(url)
    .then(r => r.json())
    .then(data => {

      // On ignore la première ligne (en-têtes)
      const rows = data.slice(1);

      const labels = rows.map(r => r[0].replace(".000", ""));
      const kp = rows.map(r => parseFloat(r[1]));

      const colors = kp.map(k => {
        if (k <= 3) return "rgba(0, 200, 0, 0.9)";        // Vert
        if (k <= 5) return "rgba(255, 140, 0, 0.9)";      // Orange
        if (k <= 7) return "rgba(255, 0, 0, 0.9)";        // Rouge
        return "rgba(200, 0, 255, 0.9)";                   // Pourpre
      });

      new Chart(document.getElementById("kp3h"), {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "KP (3h)",
            data: kp,
            backgroundColor: colors,
            borderColor: "#fff",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, max: 9, ticks: { color: "#fff" }},
            x: { ticks: { color: "#fff", maxTicksLimit: 12 }}
          },
          plugins: { legend: { labels: { color: "#fff" }}}
        }
      });
    });
</script>

</body>
</html>
